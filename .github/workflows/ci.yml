name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies for Cartopy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check amoc/ tests/

      - name: Run unit tests (no large data required)
        run: pytest tests/ -m "not requires_data"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
